<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>404 — Stackly PMS</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{--accent:#c0392b;--accent2:#e74c3c;--accent3:#ff6b6b;}
body{background:#0d0d0d;color:#fff;font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.grid-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.02) 1px,transparent 1px);background-size:60px 60px;animation:gridMove 20s linear infinite;pointer-events:none;}
@keyframes gridMove{to{background-position:60px 60px;}}
.glow{position:fixed;top:30%;left:50%;transform:translate(-50%,-50%);width:600px;height:300px;border-radius:50%;background:radial-gradient(ellipse,rgba(192,57,43,0.08) 0%,transparent 70%);pointer-events:none;}
.wrap{position:relative;z-index:1;text-align:center;padding:40px 24px;max-width:560px;animation:fadeUp 0.7s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
.num{font-family:'Playfair Display',serif;font-size:clamp(6rem,18vw,9rem);font-weight:700;line-height:1;letter-spacing:-4px;background:linear-gradient(135deg,#fff 30%,rgba(192,57,43,0.7) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px;}
.bar{width:52px;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent3));margin:20px auto;border-radius:3px;}
h2{font-family:'Playfair Display',serif;font-size:clamp(1.3rem,4vw,1.75rem);margin-bottom:12px;}
p{color:rgba(255,255,255,0.5);font-size:0.95rem;line-height:1.75;max-width:360px;margin:0 auto 36px;}
.btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
.btn{padding:12px 26px;border-radius:8px;font-size:0.85rem;font-weight:600;letter-spacing:0.04em;cursor:pointer;transition:all 0.28s ease;display:inline-flex;align-items:center;gap:8px;border:none;}
.btn-red{background:var(--accent);color:#fff;box-shadow:0 8px 28px rgba(192,57,43,0.35); text-decoration: none;}
.btn-red:hover{background:var(--accent2);transform:translateY(-2px);box-shadow:0 14px 40px rgba(192,57,43,0.45);}
.btn-ghost{background:transparent;color:rgba(255,255,255,0.65);border:1.5px solid rgba(255,255,255,0.18);}
.btn-ghost:hover{border-color:var(--accent2);color:var(--accent3);transform:translateY(-2px);}
@media(max-width:480px){.btns{flex-direction:column;align-items:center;}.btn{width:100%;justify-content:center;}}
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="glow"></div>
<div class="wrap">
  <div class="num">404</div>
  <div class="bar"></div>
  <h2>Page Not Found</h2>
  <p>The page you're looking for doesn't exist or has been moved. Let's get you back.</p>
  <div class="btns">
    <button class="btn btn-ghost" onclick="goBack()"><i class="fa-solid fa-arrow-left"></i> Go Back</button>
    <a href="index.html" class="btn btn-red"><i class="fa-solid fa-house"></i> Go Home</a>
  </div>
</div>
<script>
function goBack(){
  var ref = sessionStorage.getItem('pms_ref');
  var scroll = sessionStorage.getItem('pms_scroll');
  if(ref){
    sessionStorage.removeItem('pms_ref');
    sessionStorage.removeItem('pms_scroll');
    // Store scroll to restore AFTER the target page loads
    if(scroll) sessionStorage.setItem('pms_scroll_restore', scroll);
    window.location.href = ref;
  } else if(document.referrer && document.referrer !== location.href){
    window.location.href = document.referrer;
  } else {
    window.location.href = 'index.html';
  }
}
</script>
</body>
</html>
